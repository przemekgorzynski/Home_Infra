---
- name: Update system
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: true
    autoremove: true

- name: Install standard packages
  ansible.builtin.apt:
    name: "{{ standard_packages }}"
    state: present

- name: Ensure Python packages installed on host
  ansible.builtin.pip:
    name: "{{ python_packages }}"
    state: present
    extra_args: "--break-system-packages"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Set timezone to Europe/Warsaw
  community.general.timezone:
    name: "{{ timezone }}"

- name: SSH configure
  tags:
    - ssh
  block:
    - name: Set ssh banner
      ansible.builtin.copy:
        src: files/ssh-banner.net
        dest: /etc/issue.net
        owner: root
        group: root
        mode: '0644'
    - name: Set SSH config files
      ansible.posix.synchronize:
        src: files/sshd_config/
        dest: /etc/ssh/sshd_config.d/
        private_key: "{{ lookup('file', admin_user[0].public_key_path) }}"
        delete: true
        owner: false
        group: false

- name: Detect EFI partition UUID
  ansible.builtin.shell: blkid -t TYPE=vfat -o value -s UUID | head -1
  register: detected_efi_uuid
  changed_when: false

- name: Fix /boot/efi fstab UUID to match current hardware
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '.*/boot/efi.*'
    line: "/dev/disk/by-uuid/{{ detected_efi_uuid.stdout }} /boot/efi vfat defaults 0 1"
  when: detected_efi_uuid.stdout != ""

- name: Mask systemd-networkd-wait-online to prevent slow boot
  ansible.builtin.systemd:
    name: systemd-networkd-wait-online
    masked: true

- name: Install Docker via official script
  ansible.builtin.shell:
    cmd: curl -fsSL https://get.docker.com | sh
    creates: /usr/bin/docker