- name: Clear existing filesystems from pool devices
  vars:
    _disks: "{{ item.pool.vdevs | map(attribute='disks') | flatten }}"
  ansible.builtin.command: "wipefs -af {{ _disks | join(' ') }}"
  when: not item.imported and not item.importable
  loop: "{{ pool_states }}"
  loop_control:
    label: "{{ item.pool.pool_name }}"

- name: Create ZFS pools
  community.general.zpool:
    name: "{{ item.pool.pool_name }}"
    state: present
    force: true
    vdevs: "{{ item.pool.vdevs }}"
    filesystem_properties: "{{ item.pool.filesystem_properties | default({}) }}"
  when: not item.imported and not item.importable
  loop: "{{ pool_states }}"
  loop_control:
    label: "{{ item.pool.pool_name }}"
