- name: Deploy ZFS encryption key loader systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/zfs-load-encryption-keys.service
    mode: '0644'
    content: |
      [Unit]
      Description=Load ZFS encryption keys and mount datasets
      After=zfs-import.target
      Before=zfs-mount.service
      Requires=zfs-import.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/sbin/zfs load-key -a
      ExecStartPost=/usr/sbin/zfs mount -a

      [Install]
      WantedBy=zfs-import.target

- name: Enable ZFS encryption key loader service
  ansible.builtin.systemd:
    name: zfs-load-encryption-keys
    enabled: true
    daemon_reload: true

- name: Remove legacy ZFS boot cron job
  ansible.builtin.cron:
    name: "Load ZFS keys and mount datasets at boot"
    state: absent
    user: root

- name: Cap ZFS ARC to 8 GB
  ansible.builtin.copy:
    dest: /etc/modprobe.d/zfs.conf
    mode: '0644'
    content: "options zfs zfs_arc_max=8589934592\n"

- name: Apply ZFS ARC cap immediately
  ansible.builtin.shell: echo 8589934592 > /sys/module/zfs/parameters/zfs_arc_max
  args:
    executable: /bin/bash

- name: Schedule monthly ZFS scrub
  ansible.builtin.cron:
    name: "Monthly ZFS scrub"
    user: root
    minute: "0"
    hour: "2"
    day: "1"
    job: "zpool list -H -o name | xargs -I{} zpool scrub {}"
