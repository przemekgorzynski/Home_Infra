- name: Store ZFS encryption key
  ansible.builtin.copy:
    content: "{{ ZFS_ENCRYPTION_KEY | b64decode }}"
    dest: "{{ zfs.encryption.keylocation }}"
    mode: '0600'

- name: Ensure ZFS pool mount directories exist
  ansible.builtin.file:
    path: "{{ item.mount_directory }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ zfs.zfs_pools }}"
  loop_control:
    label: "{{ item.pool_name }}"

- name: Check pool state
  ansible.builtin.include_tasks: pool_check.yml

- name: Import pools
  ansible.builtin.include_tasks: pool_import.yml

- name: Create pools
  ansible.builtin.include_tasks: pool_create.yml

- name: Configure datasets
  ansible.builtin.include_tasks: datasets.yml

- name: Configure boot
  ansible.builtin.include_tasks: boot.yml
