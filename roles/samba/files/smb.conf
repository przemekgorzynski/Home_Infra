#======================= Global Settings =======================
[global]
workgroup = WORKGROUP
server string = samba
netbios name = nas
security = user
encrypt passwords = yes
create mask = 0660
directory mask = 0770
map to guest = Bad User

#======================= Share Definitions =======================
[public]
path = /share/public
comment = Public share
writable = yes
browseable = yes
guest ok = yes
guest only = yes
force create mode = 0666
force directory mode = 0777

[priv]
path = /share/priv
comment = Priv
read only = no
browseable = no
hide dot files = yes
valid users = @admins przemek
write list = @admins przemek

[torrent]
path = /share/torrent
comment = Torrent
read only = no
browseable = no
hide dot files = yes
valid users = @admins przemek
write list = @admins przemek
