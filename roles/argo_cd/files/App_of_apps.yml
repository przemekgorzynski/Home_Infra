apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app4apps
  namespace: argocd
  labels:
    app.kubernetes.io/app: app4apps
spec:
  project: default
  source:
    repoURL: git@github.com:przemekgorzynski/ArgoCDApps.git
    targetRevision: main
    path: app-of-apps
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    # Kyverno's pre/post-delete Helm hooks make ArgoCD add extra finalizers
    # to the managed Application objects at runtime. These aren't in git, so
    # the root app would otherwise show them as permanent drift.
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /metadata/finalizers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
