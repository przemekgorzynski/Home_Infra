apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app4apps
  namespace: argocd
  labels:
    app.kubernetes.io/app: app4apps
spec:
  project: default
  source:
    repoURL: git@github.com:przemekgorzynski/ArgoCDApps.git
    targetRevision: main
    path: app-of-apps
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
