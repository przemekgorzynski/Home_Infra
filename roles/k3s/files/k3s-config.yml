# /etc/rancher/k3s/config.yaml

write-kubeconfig-mode: "0600"

# TLS certificates
tls-san:
  - "k3s.local"
  - "k3s.internal"

# Node labels
node-label:
  - "env=prod"

# Disable default K3s services
disable:
  - traefik

# Cluster initialization
cluster-init: true

# Use this interface/IP for K3s cluster API and communication
node-ip: "{{ ansible_host }}"     # enp2s0 IP

# Advertise this address to other nodes (if multi-node cluster later)
advertise-address: "{{ ansible_host }}"

# Optional: bind K3s API only to this interface
bind-address: "{{ ansible_host }}"

# Encrypt secrets at rest in etcd
secrets-encryption: true

# Protect kernel defaults from being modified by workloads
protect-kernel-defaults: true

# API server hardening
kube-apiserver-arg:
  - "anonymous-auth=false"
  - "profiling=false"
  - "service-account-lookup=true"
  - "audit-log-path=/var/log/k3s-audit.log"
  - "audit-log-maxage=30"
  - "audit-log-maxbackup=3"
  - "audit-log-maxsize=100"

# Kubelet hardening
kubelet-arg:
  - "anonymous-auth=false"
  - "authorization-mode=Webhook"

# Disable profiling on controller-manager and scheduler
kube-controller-manager-arg:
  - "profiling=false"

kube-scheduler-arg:
  - "profiling=false"

# etcd snapshots — stored on ZFS tank mirror for resilience
etcd-snapshot-schedule-cron: "0 */6 * * *"
etcd-snapshot-retention: 14
etcd-snapshot-dir: /data/k3s-etcd-snapshots
