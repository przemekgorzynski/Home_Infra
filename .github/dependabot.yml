version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: "ansible-galaxy"
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
      - ansible
