---
all:
  vars:
    admin_user:
      - name: przemek
        uid: 1000
        public_key_path: '{{ playbook_dir }}/roles/user_mgmnt/public_keys/przemek'
    admin_group:
      - name: admins
        gid: 1100
    users:
      - name: '{{ admin_user[0].name }}'
        additional_groups: 'users,sudo,adm,www-data,{{ admin_group[0].name }}'
        shell: '/bin/bash'
        state: present
        uid: '{{ admin_user[0].uid }}'
        public_key_path: '{{ admin_user[0].public_key_path }}'
    timezone: Europe/Warsaw
    standard_packages:
      - openssh-server
      - curl
      - network-manager
      - git
      - net-tools
      - vim
      - wget
      - ufw
      - fail2ban
      - python3-pip
      - zfsutils-linux
      - zfs-initramfs
      - ca-certificates
      - gnupg
      - lsb-release
      - apache2-utils
      - linux-generic-hwe-24.04
      - jq
      - tree

    python_packages:
      - kubernetes
      - docker

  hosts:
    wtr:
      ansible_host: 192.168.10.20
      ansible_user: przemek
      ansible_gather_facts: true
      ansible_become: true
      ansible_become_user: root
      ansible_become_method: sudo
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519
      hostname: wtr
      zfs:
        encryption:
          encryption: aes-256-gcm
          keyformat: raw
          keylocation: /root/zfs.key
        zfs_pools:
          - pool_name: tank
            mount_directory: /data
            filesystem_properties:
              compression: lz4
            vdevs:
              - type: mirror
                disks:
                  - /dev/sda
                  - /dev/sdb
              - role: cache
                disks:
                  - /dev/nvme0n1
            datasets:
              - dataset_name: tank/photos
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/photos'
              - dataset_name: tank/media
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/media'
              - dataset_name: tank/media/movies
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/media/movies'
              - dataset_name: tank/media/tv-series
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/media/tv-series'
              - dataset_name: tank/media/other
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/media/other'
              - dataset_name: tank/files
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/files'
              - dataset_name: tank/priv
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/priv'
                recordsize: '1048576'
                owner: przemek
                group: admins
                mode: '0777'
                recurse: true
              - dataset_name: tank/public
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/public'
              - dataset_name: tank/torrent
                compression: lz4
                setuid: 'off'
                mountpoint: '/data/torrent'
                recordsize: '1048576'
                owner: przemek
                group: admins
                mode: '0777'
                recurse: true
          - pool_name: ssd
            mount_directory: /data-ssd
            filesystem_properties:
              compression: lz4
            vdevs:
              - type: stripe
                disks:
                  - /dev/sdc
            datasets:
              - dataset_name: ssd/torrent
                compression: lz4
                setuid: 'off'
                mountpoint: '/data-ssd/torrent'
                mode: '0777'
      k3s:
        deploy: true
        kubeconfig_file: /etc/rancher/k3s/k3s.yaml
        argocd:
          deploy: true
          namespace: argocd
          values_files:
            - ArgoCD_config.yml

    localhost:
      ansible_connection: local
